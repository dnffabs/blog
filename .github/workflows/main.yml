name: Deploy website

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-website
  cancel-in-progress: true

env:
  DEPLOY_PATH: /var/www/dnffabs

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List files to deploy
        run: |
          ls -al

      - name: Upload static files via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "index.html,about.html,contact.html,blog.html,service.html,portfolio-details.html,assets"
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true
          rm: false
